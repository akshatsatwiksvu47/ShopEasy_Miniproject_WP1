<!-- JavaScript Validation with Advanced Functions -->
<script>
/* ===== 1. IIFE - Form Validation Module ===== */
// Immediately Invoked Function Expression for encapsulation
const FormValidator = (() => {
    // Private variables
    const namePattern  = /^[A-Za-z ]+$/;
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    // Private helper function
    const trimValue = (value) => value ? value.trim() : '';
    
    // Return public methods
    return {
        validateName: (name) => {
            const trimmed = trimValue(name);
            return trimmed !== '' && namePattern.test(trimmed);
        },
        validateEmail: (email) => {
            const trimmed = trimValue(email);
            return trimmed !== '' && emailPattern.test(trimmed);
        },
        validateAge: (age, minAge = 1, maxAge = 120) => {
            // Default parameters for min/max age
            const ageNum = Number(age);
            return ageNum >= minAge && ageNum <= maxAge;
        }
    };
})();

/* ===== 2. DEFAULT PARAMETERS ===== */
function calculatePasswordScore(password, minLength = 8) {
    // Default parameter for minimum length
    let score = 0;
    if(password.length >= minLength) score++;
    if(/[A-Z]/.test(password)) score++;
    if(/[a-z]/.test(password)) score++;
    if(/[0-9]/.test(password)) score++;
    if(/[@$!%*?&]/.test(password)) score++;
    return score;
}

/* ===== 3. ARROW FUNCTIONS ===== */
const setValid = (input, errorEl) => {
    input.classList.remove("invalid");
    input.classList.add("valid");
    errorEl.textContent = "";
};

const setInvalid = (input, errorEl, message) => {
    input.classList.remove("valid");
    input.classList.add("invalid");
    errorEl.textContent = message;
};

// Arrow function for password strength
const checkPasswordStrength = (value) => {
    const score = calculatePasswordScore(value);
    
    if(score <= 2){
        strengthFill.style.width = "30%";
        strengthFill.style.background = "red";
    }
    else if(score <= 4){
        strengthFill.style.width = "60%";
        strengthFill.style.background = "orange";
    }
    else{
        strengthFill.style.width = "100%";
        strengthFill.style.background = "green";
    }
    
    return score >= 4;
};

/* ===== 4. call(), apply(), bind() - Method Sharing ===== */
// Utility object with validation method
const ValidationHelper = {
    showError: function(input, errorEl, message) {
        setInvalid(input, errorEl, message);
    },
    showSuccess: function(input, errorEl) {
        setValid(input, errorEl);
    }
};

// Using call() to borrow method
const showFieldError = function(input, errorEl, message) {
    this.showError(input, errorEl, message);
};

// Using apply() for flexible argument passing
function validateMultipleFields(...fields) {
    // apply() passes array as arguments
    return fields.every(field => field.isValid);
}

// Using bind() for event handlers
const firstName = document.getElementById("firstName");
const lastName  = document.getElementById("lastName");
const email     = document.getElementById("email");
const password  = document.getElementById("password");
const age       = document.getElementById("age");
const gender    = document.getElementById("gender");
const submitBtn = document.getElementById("submitBtn");
const strengthFill = document.getElementById("strengthFill");

/* ===== 5. REST PARAMETERS ===== */
// Function using rest parameters
function getFormData(...fieldIds) {
    return fieldIds.map(id => {
        const el = document.getElementById(id);
        return { id: id, value: el.value, element: el };
    });
}

/* ===== 6. SPREAD OPERATOR ===== */
// Merge default fields with additional fields
const defaultFields = ['firstName', 'lastName', 'email'];
const optionalFields = ['age', 'gender'];
const allFormFields = [...defaultFields, 'password', ...optionalFields]; // Spread operator

/* ===== MAIN VALIDATION ===== */

function validateForm(){
    let valid = true;
    
    // Using bind() to create handler with specific context
    const handleFirstName = showFieldError.bind(ValidationHelper);
    
    if(!FormValidator.validateName(firstName.value)){
        handleFirstName(firstName, firstNameError, "Only letters allowed");
        valid = false;
    } else {
        ValidationHelper.showSuccess(firstName, firstNameError); // Using call()
    }
    
    if(!FormValidator.validateName(lastName.value)){
        handleFirstName(lastName, lastNameError, "Only letters allowed");
        valid = false;
    } else {
        ValidationHelper.showSuccess(lastName, lastNameError);
    }
    
    if(!FormValidator.validateEmail(email.value)){
        handleFirstName(email, emailError, "Invalid email format");
        valid = false;
    } else {
        ValidationHelper.showSuccess(email, emailError);
    }
    
    if(!checkPasswordStrength(password.value)){
        handleFirstName(password, passwordError, "Password too weak");
        valid = false;
    } else {
        ValidationHelper.showSuccess(password, passwordError);
    }
    
    // Using default parameters
    if(!FormValidator.validateAge(age.value)){
        handleFirstName(age, ageError, "Age must be between 1 and 120");
        valid = false;
    } else {
        ValidationHelper.showSuccess(age, ageError);
    }
    
    if(gender.value === ""){
        handleFirstName(gender, genderError, "Select your gender");
        valid = false;
    } else {
        ValidationHelper.showSuccess(gender, genderError);
    }
    
    submitBtn.disabled = !valid;
    return valid;
}

/* ===== EVENT LISTENERS with bind() ===== */

// Using arrow functions for event handlers
[firstName, lastName, email, password, age].forEach(field => {
    field.addEventListener("input", () => validateForm()); // Arrow function
});

gender.addEventListener("change", () => validateForm()); // Arrow function

/* ===== Submit Handling ===== */

document.getElementById("registerForm").addEventListener("submit", function(e){
    if(!validateForm()){
        e.preventDefault();
        alert("Please correct all errors before submitting.");
    } else {
        alert("Registration Successful!");
    }
});

// Initialize
validateForm();

/* ===== Using apply() for array operations ===== */
// Example: Using apply() with Math.max
const prices = [59999, 24999, 39999, 49999];
const maxPrice = Math.max.apply(null, prices);
const minPrice = Math.min.apply(null, prices);

console.log('Price Range:', minPrice, '-', maxPrice);
console.log('All Form Fields:', allFormFields);

</script>
